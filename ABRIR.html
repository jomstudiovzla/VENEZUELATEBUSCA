<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Venezuela te Busca — Abrir Visor</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b0f14;
      color: #e8eef7;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    a {
      color: #3dd68c;
      font-size: 1.2rem;
      font-weight: 700;
    }
    p { color: #8fa3bf; margin-top: 1rem; line-height: 1.6; }
    code { background: #1a2330; padding: 0.2rem 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div>
    <h1>Venezuela te Busca</h1>
    <p id="status">Buscando servidor…</p>
    <p><a id="link-local" href="http://127.0.0.1:8000/">http://127.0.0.1:8000/</a></p>
    <p id="link-public-wrap" hidden>URL pública: <a id="link-public" href="#"></a></p>
    <p>Si no abre: <code>./arrancar.sh</code> o <code>./instalar-daemon.sh</code></p>
  </div>
  <script>
    (async () => {
      const local = "http://127.0.0.1:8000/";
      const status = document.getElementById("status");
      try {
        const res = await fetch(local + "api/public-url", { signal: AbortSignal.timeout(2500) });
        const data = await res.json();
        if (data.url) {
          document.getElementById("link-public").href = data.url;
          document.getElementById("link-public").textContent = data.url;
          document.getElementById("link-public-wrap").hidden = false;
          status.textContent = "Redirigiendo a URL pública…";
          window.location.href = data.url + "/";
          return;
        }
      } catch (_) {}
      status.textContent = "Redirigiendo al visor local…";
      window.location.href = local;
    })();
  </script>
</body>
</html>
