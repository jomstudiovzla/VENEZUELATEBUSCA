# Despliegue en Render.com — Red de Esperanza
# https://dashboard.render.com/ → New → Blueprint

services:
  - type: web
    name: red-de-esperanza
    runtime: docker
    plan: starter
    region: virginia
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: red-esperanza-data
      mountPath: /data
      sizeGB: 2
    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/red_esperanza.db
      - key: MATCH_THRESHOLD
        value: "0.55"
      - key: MATCHER_INTERVAL_SECONDS
        value: "45"
      - key: PYTHONUNBUFFERED
        value: "1"