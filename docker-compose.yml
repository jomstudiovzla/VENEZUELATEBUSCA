services:
  red-esperanza:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DATABASE_URL=sqlite+aiosqlite:////data/red_esperanza.db
      - MATCH_THRESHOLD=0.55
      - MATCHER_INTERVAL_SECONDS=45
    volumes:
      - app_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  app_data: